name: Deploy Spring Boot to Koyeb

on:
  push:
    branches:
      - staging

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Make Gradle wrapper executable
      run: chmod +x ./gradlew

    - name: Build with Gradlew
      run: ./gradlew build -x test

    - name: Install Koyeb CLI
      uses: koyeb-community/koyeb-actions@v2
      with:
        api_token: ${{ secrets.KOYEB_TOKEN }}

    - name: Deploy to Koyeb
      run: |
        koyeb service update lesser-philippine/be-management-pembayaran \
          --git-branch main \
          --env SPRING_DATASOURCE_URL="${{ secrets.SUPABASE_DB_URL }}" \
          --env SPRING_DATASOURCE_PASSWORD="${{ secrets.SUPABASE_DB_PASSWORD }}" \
          --env JAVA_TOOL_OPTIONS="-Xmx350m -Xms256m"